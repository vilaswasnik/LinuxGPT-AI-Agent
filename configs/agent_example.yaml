# Example agent configuration file
# This file demonstrates how to configure an agent using YAML

name: "ExampleAgent"
description: "An example AI agent for demonstration purposes"

# Model configuration (optional)
model_name: "gpt-4"

# Generation parameters
temperature: 0.7
max_tokens: 2048

# System prompt defines the agent's behavior
system_prompt: |
  You are a helpful AI assistant. You provide clear, accurate, and concise responses.
  You are friendly and professional in your interactions.

# Additional metadata (optional)
metadata:
  version: "1.0"
  environment: "development"
  tags:
    - "example"
    - "demo"
  capabilities:
    - "question answering"
    - "task execution"
    - "conversation"
